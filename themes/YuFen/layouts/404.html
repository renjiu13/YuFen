{{ define "main" }}
<div class="page-404 w-full min-h-[90vh] max-w-3xl mx-auto flex flex-col items-center justify-center px-4 py-8 text-center">
  <div class="mb-8">
    <img
      src="/images/404.png"
      alt="404提示图"
      class="w-64 h-auto"
      style="object-fit: contain; background: transparent;"
      onerror="this.src='https://4.122915.xyz/file/1770821209062_20260211_224640.webp'; this.onerror=null;"
    >
  </div>

  <h1 class="text-xl font-medium mb-2 text-gray-800">小笨蛋，页面跑偏啦～</h1>
  <p class="text-sm text-gray-500">可以返回首页继续浏览，或检查地址是否输入正确</p>

  <a
    href="{{ .Site.BaseURL }}"
    class="mt-6 text-sm text-gray-600 hover:text-gray-800 transition-colors underline underline-offset-2"
    aria-label="返回博客首页"
  >
    ← 返回首页
  </a>
</div>
{{ end }}
