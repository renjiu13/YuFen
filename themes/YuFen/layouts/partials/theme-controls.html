<button id="back-to-top" aria-label="回到顶部">回到顶部</button>

<!-- 全局脚本（defer 确保 DOM 解析后执行） -->
<script src="{{ "js/code-block.js" | relURL }}" defer></script>
<script src="{{ "js/theme.js" | relURL }}" defer></script>
