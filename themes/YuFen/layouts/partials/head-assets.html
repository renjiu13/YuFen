{{/* 统一管理站点头部资源、样式和基础元信息。 */}}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ .Description | default .Site.Params.description }}">
<title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
{{ if .Site.Params.favicon }}
<link rel="icon" href="{{ .Site.Params.favicon | relURL }}">
{{ end }}
{{ with .OutputFormats.Get "RSS" }}
<link rel="alternate" type="application/rss+xml" href="{{ .Permalink }}" title="{{ $.Site.Title }}">
{{ end }}
<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="{{ "css/chroma-github.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/chroma-monokai.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/code-block.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/title.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/baseof.css" | relURL }}">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          dark: '#1A1A1A',
          gray: {
            100: '#F8F8F8',
            200: '#E8E8E8',
            300: '#D0D0D0',
            400: '#999999',
            500: '#666666',
            600: '#333333',
          },
          light: '#FFFFFF',
        },
        fontFamily: {
          sans: ['PingFang SC', 'Microsoft YaHei', 'sans-serif'],
        },
      },
    }
  }
</script>
<style type="text/tailwindcss">
  @layer utilities {
    .border-l-active {
      border-left-color: theme('colors.gray.600');
    }
    .hover-lift {
      @apply transition-all duration-200 hover:translate-y-[-2px];
    }
  }
</style>
