{{/* 标签图谱样式：负责图谱容器、颜色、动画和提示框视觉效果。 */}}
<style>
  #tag-graph-container {
    width: 100%;
    height: 520px;
    background-color: #ffffff;
    border: 1px solid #eeeeee;
    border-radius: 8px;
    position: relative;
    overflow: hidden;
  }

  .dark #tag-graph-container {
    background-color: #1e1e1e;
    border-color: #2d2d2d;
  }

  #tag-graph-container svg {
    width: 100%;
    height: 100%;
  }

  .graph-node circle {
    cursor: pointer;
    transition: fill 0.2s ease;
  }

  .graph-node text {
    pointer-events: none;
    user-select: none;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  }

  .graph-link {
    pointer-events: none;
  }

  #graph-hint {
    position: absolute;
    bottom: 12px;
    right: 14px;
    font-size: 11px;
    color: #aaa;
    pointer-events: none;
  }

  .dark #graph-hint {
    color: #555;
  }

  #graph-legend {
    position: absolute;
    top: 14px;
    left: 14px;
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #999;
  }

  .dark .legend-item {
    color: #666;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  #graph-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .loading-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    animation: graph-pulse 1.2s infinite ease-in-out;
  }

  .loading-dot:nth-child(1) { background-color: #bbb; animation-delay: 0s; }
  .loading-dot:nth-child(2) { background-color: #888; animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { background-color: #555; animation-delay: 0.4s; }

  @keyframes graph-pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  #graph-tooltip {
    position: absolute;
    background: rgba(255,255,255,0.96);
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: #333;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    max-width: 180px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    z-index: 10;
  }

  .dark #graph-tooltip {
    background: rgba(30,30,30,0.96);
    border-color: #333;
    color: #ddd;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .tooltip-title {
    font-weight: 500;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tooltip-meta {
    color: #999;
    font-size: 11px;
  }

  .dark .tooltip-meta {
    color: #666;
  }
</style>
