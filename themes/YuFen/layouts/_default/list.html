{{ define "main" }}
<div class="w-full max-w-2xl">
  <h1 class="text-base font-semibold mb-6 text-gray-600">{{ if eq .Section "posts" }}归档{{ else }}{{ .Title }}{{ end }}</h1>
  <div class="post-list">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="post-item" aria-label="阅读{{ .Title }}">
      <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
      <span class="post-title">{{ .Title }}</span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
