{{/*
===============================================
terms.html — 分类聚合页模板
作用：所有分类/标签的聚合展示
功能：以标签云形式展示所有分类及其文章数量
===============================================
*/}}
{{ define "main" }}
<div class="w-full max-w-2xl">
  <h1 class="text-2xl font-bold text-gray-600 dark:text-gray-100 mb-8">{{ .Title }}</h1>

  <div class="tag-cloud-container">
    {{ range .Data.Terms.Alphabetical }}
    <a href="{{ .Page.RelPermalink }}"
       class="tag-cloud-link"
       aria-label="{{ .Page.Title }} ({{ .Count }} 项)">
      {{ .Page.Title }}
      <span class="tag-count">({{ .Count }})</span>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
