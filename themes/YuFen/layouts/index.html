{{ define "main" }}
<div class="w-full max-w-2xl flex flex-col items-center">
  {{ partial "author-profile.html" . }}

  <div class="w-full">
    <div class="section-title">
      <span class="section-title-bar"></span>
      <span class="section-title-text">最近文章</span>
    </div>

    <div class="post-list">
      {{ partial "post-items.html" (dict "pages" (first 10 .Site.RegularPages)) }}
    </div>
  </div>
</div>
{{ end }}
